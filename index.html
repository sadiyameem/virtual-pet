<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Virtual Pet</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="pet" id="petImage"></div>

        <div class="stats">
            <div>Hungry:</div>
            <div class="bar-container">
                <div class="bar hungry" id="hungryBar"></div>
            </div>

            <div>Happy:</div>
            <div class="bar-container">
                <div class="bar happy" id="happyBar"></div>
            </div>

            <div>Energy:</div>
            <div class="bar-container">
                <div class="bar energy" id="energyBar"></div>
            </div>
        </div>

        <div class="message" id="message">I am happy</div>

        <audio id="eatSound" src="cat-eating-cut.mp3" autostart="false"></audio>
        <button onclick="feedPet()">🐟 Feed</button>

        <audio id="playSound" src="cat-meow.mp3" autostart="false"></audio>
        <button onclick="playPet()">🧶 Play</button>

        <audio id="sleepSound" src="cat-sleeping-cut.mp3" autostart="false"></audio>
        <button onclick="sleepPet()">💭 Sleep</button>

        <script src="script.js"></script>
    </body>
</html>
